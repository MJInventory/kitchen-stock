<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-title" content="MJ Stock Magic">
    <title>Change Password</title>
    <link rel="apple-touch-icon" href="/mjordering-apple-touch-icon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell setup-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Inventory</p>
          <h1>Change Password</h1>
        </div>
        <div class="top-actions">
          <a class="button secondary" href="/">Main Menu</a>
        </div>
      </header>

      <section class="panel">
        <form id="passwordForm">
          <label>
            Current password
            <input id="currentPassword" type="password" autocomplete="current-password">
          </label>
          <label>
            New password
            <input id="newPassword" type="password" autocomplete="new-password" required>
          </label>
          <label>
            Repeat new password
            <input id="repeatPassword" type="password" autocomplete="new-password" required>
          </label>
          <button type="submit">Update Password</button>
          <p id="passwordMessage" role="status"></p>
        </form>
      </section>
    </main>

    <footer class="app-version">MJ Stock Magic v61</footer>
    <script src="/theme.js"></script>
    <script src="/change-password.js" type="module"></script>
  </body>
</html>
