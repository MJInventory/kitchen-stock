<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Kitchen Stock">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Kitchen Requests</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Inventory</p>
        <h1>Kitchen Stock</h1>
        <label>
          Username
          <input id="usernameInput" type="text" autocomplete="username" required>
        </label>
        <label>
          Password
          <input id="passwordInput" type="password" inputmode="numeric" autocomplete="current-password" required>
        </label>
        <button type="submit">Log In</button>
        <p id="loginMessage" role="status"></p>
      </form>
    </section>

    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Inventory</p>
          <h1>Kitchen Stock</h1>
        </div>
        <div class="top-actions">
          <span id="currentUser" class="user-chip"></span>
          <a class="button secondary" href="/inventory-settings.html">Inventory Setup</a>
          <a class="button secondary" href="/stock-count.html">Stock Count</a>
          <a class="button secondary" href="/invoice-capture.html">Invoices</a>
          <a class="button secondary" href="/driver-sheet.html">Driver Sheet</a>
          <button id="refreshButton" type="button">Refresh</button>
          <button id="logoutButton" class="secondary" type="button">Log Out</button>
        </div>
      </header>

      <section class="panel">
        <form id="requestForm">
          <h2>Request Missing Item</h2>
          <div class="row">
            <label>
              Area
              <select id="areaFilter">
                <option value="">All</option>
                <option>Bar</option>
                <option>Kitchen</option>
                <option>FOH</option>
              </select>
            </label>
            <label>
              Location
              <select id="locationFilter">
                <option value="">All</option>
                <option>Dry Storage</option>
                <option>Cooler</option>
                <option>Freezer</option>
                <option>Liquor Storage</option>
                <option>General Storage</option>
              </select>
            </label>
          </div>
          <label>
            Item
            <select id="itemSelect" required></select>
          </label>

          <div class="row">
            <label>
              Quantity
              <input id="quantityInput" type="number" min="1" step="1" required>
            </label>
            <label>
              Urgency
              <select id="urgencySelect">
                <option>Medium</option>
                <option>High</option>
                <option>Critical</option>
                <option>Low</option>
              </select>
            </label>
          </div>

          <label>
            Requested by
            <input id="requestedByInput" type="text" value="Kitchen" autocomplete="name" readonly>
          </label>

          <label>
            Notes
            <textarea id="notesInput" rows="3"></textarea>
          </label>

          <button id="submitButton" type="submit">Submit Request</button>
          <p id="message" role="status"></p>
        </form>
      </section>

      <section class="list-section">
        <h2>Recent Requests</h2>
        <div id="requestList" class="request-list"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
