<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MJ Stock Magic">
    <title>Internal Orders</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/mjstock-apple-touch-v162.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="order-app">
    <section id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Inventory</p>
        <h1>Internal Orders</h1>
        <label>Username <input id="usernameInput" type="text" autocomplete="username" required></label>
        <label>Password <input id="passwordInput" type="password" inputmode="numeric" autocomplete="current-password" required></label>
        <button type="submit">Log In</button>
        <p id="loginMessage" role="status"></p>
      </form>
    </section>

    <main class="order-shell">
      <header class="order-topbar">
        <div class="brand-block">
          <img class="brand-mark brand-logo" src="/madame-janette-logo-v162.png" alt="Madame Janette">
          <div>
            <h1>MJ Stock Magic</h1>
            <p>MADAME JANETTE</p>
          </div>
        </div>
        <label class="feature-select">
          <span>Go to</span>
          <select id="featureMenu" aria-label="Inventory tools">
            <option value="/">Front Page</option>
            <option value="/internal-orders.html">Internal Orders</option>
            <option value="/picker-sheet.html">Picker Board</option>
          </select>
        </label>
        <div class="top-actions">
          <span id="currentUser" class="user-chip"></span>
          <button id="submitButton" class="save-pill" type="button">0 Saved</button>
          <button id="logoutButton" class="icon-button" type="button">Log Out</button>
        </div>
      </header>

      <section class="daily-order-panel">
        <div class="daily-order-heading">
          <h2>Internal Requests</h2>
          <span>Staff flow</span>
        </div>
        <p class="section-helper">Ask the picker for individual items. Stock is treated as 12 items per box for this first version.</p>
      </section>

      <section class="order-search-band">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Search inventory items..." autocomplete="off">
        </label>
        <div class="order-filters">
          <select id="areaFilter" aria-label="Inventory area">
            <option value="">All Areas</option>
          </select>
          <select id="locationFilter" aria-label="Storage location">
            <option value="">All Locations</option>
          </select>
        </div>
        <div id="selectedChips" class="selected-chips"></div>
        <p id="message" class="order-message" role="status"></p>
      </section>

      <section id="categoryView" class="category-view">
        <div class="order-divider"><span>All Categories</span></div>
        <div id="categoryGrid" class="category-grid"></div>
      </section>

      <section id="productView" class="product-view" hidden>
        <div class="product-heading">
          <button id="backButton" class="back-button" type="button">Back Home</button>
          <div>
            <h2 id="categoryTitle">Products</h2>
            <p id="categoryMeta"></p>
          </div>
        </div>
        <div id="catalogList" class="product-list"></div>
      </section>

      <section class="daily-order-panel">
        <div class="daily-order-heading">
          <h2>My Internal Orders</h2>
          <span id="internalCount"></span>
        </div>
        <div id="internalOrderList" class="daily-order-list"></div>
      </section>
    </main>

    <footer class="app-version">MJ Stock Magic v2.006</footer>
    <script src="/menus.js"></script>
    <script src="/push.js"></script>
    <script src="/theme.js"></script>
    <script src="/internal-orders.js" type="module"></script>
  </body>
</html>
