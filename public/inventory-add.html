<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-title" content="MJ Stock Magic">
    <title>Add Inventory Item</title>
    <link rel="apple-touch-icon" href="/mjstock-apple-touch-v148.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Inventory</p>
        <h1>Add Item</h1>
        <label>Username <input id="usernameInput" type="text" autocomplete="username" required></label>
        <label>Password <input id="passwordInput" type="password" autocomplete="current-password" required></label>
        <button type="submit">Log In</button>
        <p id="loginMessage" role="status"></p>
      </form>
    </section>

    <main class="shell setup-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Inventory</p>
          <h1>Add Inventory Item</h1>
        </div>
        <div class="top-actions">
          <span id="currentUser" class="user-chip"></span>
          <a class="button secondary" href="/">Main Menu</a>
          <button id="logoutButton" class="secondary" type="button">Log Out</button>
        </div>
      </header>

      <section class="panel">
        <form id="itemForm" class="admin-form-grid">
          <label>Item name <input id="itemName" type="text" required></label>
          <label>Category <select id="category" required></select></label>
          <label>Area <select id="inventoryArea" required></select></label>
          <label>Storage location <select id="storageLocation" required></select></label>
          <label>Shelf code <select id="shelfCode"></select></label>
          <label>Supplier <select id="supplierId"></select></label>
          <label>Unit <select id="unit" required></select></label>
          <label>Current stock <input id="currentQuantity" type="number" min="0" step="0.01" value="0" required></label>
          <label>Minimum stock <input id="minimumThreshold" type="number" min="0" step="0.01" value="0" required></label>
          <button type="submit">Add Item</button>
          <p id="itemMessage" role="status"></p>
        </form>
      </section>
    </main>

    <footer class="app-version">MJ Stock Magic v149</footer>
    <script src="/menus.js"></script>
    <script src="/push.js"></script>
    <script src="/theme.js"></script>
    <script src="/inventory-add.js" type="module"></script>
  </body>
</html>
