<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MJ Stock Magic">
    <title>Picker Board</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/mjstock-apple-touch-v162.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Inventory</p>
        <h1>Picker Board</h1>
        <label>Username <input id="usernameInput" type="text" autocomplete="username" required></label>
        <label>Password <input id="passwordInput" type="password" inputmode="numeric" autocomplete="current-password" required></label>
        <button type="submit">Log In</button>
        <p id="loginMessage" role="status"></p>
      </form>
    </section>

    <main class="shell setup-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Inventory</p>
          <h1>Picker Board</h1>
        </div>
        <div class="top-actions">
          <span id="currentUser" class="user-chip"></span>
          <button id="refreshButton" class="secondary" type="button">Refresh</button>
          <button id="logoutButton" class="secondary" type="button">Log Out</button>
        </div>
      </header>

      <section class="panel">
        <h2>Open Internal Orders</h2>
        <p class="helper-text">Grouped by who asked for the items so the picker can prepare one person at a time.</p>
        <p id="message" role="status"></p>
      </section>

      <section id="pickerGroups" class="settings-list"></section>
    </main>

    <footer class="app-version">MJ Stock Magic v162</footer>
    <script src="/menus.js"></script>
    <script src="/push.js"></script>
    <script src="/theme.js"></script>
    <script src="/picker-sheet.js" type="module"></script>
  </body>
</html>
