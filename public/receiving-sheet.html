<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-title" content="MJ Stock Magic">
    <title>Receiving</title>
    <link rel="apple-touch-icon" href="/mjordering-apple-touch-icon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Inventory</p>
        <h1>Receiving</h1>
        <label>Username <input id="usernameInput" type="text" autocomplete="username" required></label>
        <label>Password <input id="passwordInput" type="password" inputmode="numeric" autocomplete="current-password" required></label>
        <button type="submit">Log In</button>
        <p id="loginMessage" role="status"></p>
      </form>
    </section>

    <main class="shell sheet-shell">
      <header class="topbar no-print">
        <div>
          <p class="eyebrow">Inventory</p>
          <h1>Receiving</h1>
        </div>
        <div class="top-actions">
          <span id="currentUser" class="user-chip"></span>
          <a class="button secondary" href="/">Main Menu</a>
          <a class="button secondary" href="/driver-sheet.html">Driver Sheet</a>
          <a class="button secondary" href="/order-report.html">Reports</a>
          <button id="logoutButton" class="secondary" type="button">Log Out</button>
        </div>
      </header>

      <section class="panel no-print">
        <div class="row">
          <label>
            Delivery date
            <input id="sheetDate" type="date">
          </label>
        </div>
        <div class="sheet-actions">
          <button id="loadSheetButton" type="button">Load Receiving</button>
        </div>
        <p id="sheetMessage" role="status"></p>
      </section>

      <section class="print-sheet">
        <div class="sheet-header">
          <div>
            <p class="eyebrow">Cargo Receiving</p>
            <h1>Receiving Sheet</h1>
          </div>
          <div class="sheet-meta">
            <span id="printDate"></span>
            <span id="printReceiver"></span>
          </div>
        </div>
        <div id="receivingList" class="sheet-list"></div>
      </section>
    </main>

    <footer class="app-version no-print">MJ Stock Magic v136</footer>
    <script src="/menus.js"></script>
    <script src="/push.js"></script>
    <script src="/theme.js"></script>
    <script src="/receiving-sheet.js" type="module"></script>
  </body>
</html>
