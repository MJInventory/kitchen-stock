services:
  - type: web
    name: kitchen-stock
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: AIRTABLE_TOKEN
        sync: false
      - key: ITEM_CACHE_MS
        value: "600000"
      - key: REQUEST_CACHE_MS
        value: "20000"
